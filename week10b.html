<!DOCTYPE html> 

<html> 

<head> 

    <title>Sort Three Numbers</title> 
    <link rel="stylesheet" href="week10b.css">

</head> 

<body> 

<h2>Sort Three Numbers</h2> 

<input type="number" id="num1" placeholder="Number 1"> 

<input type="number" id="num2" placeholder="Number 2"> 

<input type="number" id="num3" placeholder="Number 3"> 

<br> 

 

<button onclick="sortNumbers()">Sort</button> 

 

<p id="result"></p> 

 

<script> 

function sortNumbers() { 

    let a = Number(document.getElementById("num1").value); 

    let b = Number(document.getElementById("num2").value); 

    let c = Number(document.getElementById("num3").value); 

    let first, second, third; 

    if (a >= b && a >= c) { 

        first = a; 

        if (b >= c) { 

            second = b; 

            third = c; 

        } else { 

            second = c; 

            third = b; 

        } 

    }  

    else if (b >= a && b >= c) { 

        first = b; 

        if (a >= c) { 

            second = a; 

            third = c; 

        } else { 

            second = c; 

            third = a; 

        } 

    }  

    else { 

        first = c; 

        if (a >= b) { 

            second = a; 

            third = b; 

        } else { 

            second = b; 

            third = a; 

        } 

    } 

    document.getElementById("result").innerHTML = 

        "Sorted (Descending): " + first + ", " + second + ", " + third; 

} 

</script> 

</body> 

</html>
