<!DOCTYPE html>
<html>
    <body>
        <p style="text-align: center;">This text is normal</p>
        <hr>
        <p><b>This text is bold text </b></p>
        <p><strong>This text is strong</strong></p>
        <p><i>This text is italic</i></p>
        <p>this text is marked <mark>marked</mark> text</p>
        <p><u>this text is underlined</u></p>
        <p><del>this text is deleted</del></p>
        <p>this text is <sub>Subscripted</sub></p></p>
        <p>this text is <sup>Superscripted</sup></p>
    </body>
</html>
