<!DOCTYPE html>
<html>
<head>
    <title>Mini Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: whitesmoke;
        }

        header {
            background-color: midnightblue;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 26px;
            letter-spacing: 2px;
        }

        nav {
            background-color: steelblue;
            padding: 12px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        nav a:hover {
            color: coral;
        }

        .frame-container {
            text-align: center;
            margin-top: 20px;
        }

        iframe {
            width: 85%;
            height: 400px;
            border-radius: 12px;
            border: 4px solid seagreen;
            background-color: white;
        }
    </style>
</head>
<body>

    <header>Mini Website</header>

    <nav>
        <a href="home.html" target="content">Home</a>
        <a href="about.html" target="content">About</a>
        <a href="contact.html" target="content">Contact</a>
    </nav>

    <div class="frame-container">
        <iframe name="content" src="home.html"></iframe>
    </div>

</body>
</html>
